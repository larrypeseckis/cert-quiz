<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>CCSP Practice Quiz</title>
<link rel="stylesheet" href="styles.css" />
</head>
<body>
<header>
  <h1>CCSP Practice Quiz</h1>
  <p class="sub">Original practice questions modeled on the ISC2 CCSP Common Body of Knowledge. Not affiliated with ISC2.</p>
</header>

<main id="app"></main>

<template id="tpl-home">
  <section class="card">
    <h2>Start a session</h2>
    <div class="row">
      <label>Domain
        <select id="domain">
          <option value="all">All domains</option>
        </select>
      </label>
      <label>Questions
        <select id="count">
          <option value="10">10</option>
          <option value="25" selected>25</option>
          <option value="50">50</option>
          <option value="100">100</option>
          <option value="0">All available</option>
        </select>
      </label>
      <label>Order
        <select id="order">
          <option value="random" selected>Random</option>
          <option value="sequential">Sequential</option>
        </select>
      </label>
    </div>
    <button id="start" class="primary">Start quiz</button>
  </section>

  <section class="card">
    <h2>Your progress</h2>
    <div id="stats"></div>
    <button id="reset" class="ghost">Reset progress</button>
  </section>

  <section class="card">
    <h2>Adaptive weighting</h2>
    <p class="sub" style="margin-bottom:12px">Bias question selection toward your weak areas. Two ways to provide scores — pick whichever is easier.</p>

    <h3>Option A: paste from a report</h3>
    <p class="sub" style="margin-bottom:8px">One sub-objective per line, optional score (0&ndash;100) at the end. Markdown list markers, headings, and blank lines are ignored. Lines without a score are treated as weak areas.</p>
    <textarea id="score-text" rows="8" placeholder="1.1 Understand cloud computing concepts 50&#10;1.2 Describe cloud reference architecture 75&#10;2.3 Design and apply data security technologies and strategies 0&#10;# or just list weak areas (no score = flagged as weak):&#10;- 4.7 Design appropriate identity and access management solutions"></textarea>
    <div class="actions" style="margin-top:8px">
      <button id="apply-text" class="primary">Apply pasted scores</button>
    </div>

    <h3 style="margin-top:18px">Option B: load a report file</h3>
    <p class="sub" style="margin-bottom:8px">Accepts a CompTIA-style score report <code>.js</code>, or a markdown / text file in the same format as Option A. Personal info is ignored.</p>
    <div class="row">
      <label>File
        <input id="score-file" type="file" accept=".js,.json,.txt,.md" />
      </label>
    </div>

    <div id="weights-panel" style="margin-top:14px"></div>
    <div class="actions">
      <button id="download-weights" class="ghost">Download weights.md</button>
      <button id="clear-weights" class="ghost">Clear weights</button>
    </div>
  </section>
</template>

<template id="tpl-quiz">
  <section class="card">
    <div class="quizbar">
      <span id="progress"></span>
      <span id="domain-tag" class="tag"></span>
    </div>
    <h2 id="qtext"></h2>
    <ol id="options" class="options"></ol>
    <div id="feedback" class="feedback hidden"></div>
    <div class="actions">
      <button id="next" class="primary" disabled>Next</button>
      <button id="quit" class="ghost">End session</button>
    </div>
  </section>
</template>

<template id="tpl-results">
  <section class="card">
    <h2>Session results</h2>
    <p id="score" class="score"></p>
    <h3>By domain</h3>
    <table id="bydomain"><thead><tr><th>Domain</th><th>Correct</th><th>Total</th><th>%</th></tr></thead><tbody></tbody></table>
    <h3>Review</h3>
    <ol id="review" class="review"></ol>
    <div class="actions">
      <button id="again" class="primary">Back to home</button>
    </div>
  </section>
</template>

<script src="questions.js" charset="utf-8"></script>
<script src="topics.js" charset="utf-8"></script>
<script src="app.js" charset="utf-8"></script>
</body>
</html>
